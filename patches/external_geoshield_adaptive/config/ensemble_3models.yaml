# Configuration for GeoShield attack

defaults:
  - _self_

data:
  batch_size: 1
  num_samples: 100
  output: "./output"
  cle_data_path: "data/clean_images"
  tgt_data_path: "data/target_images"
  bbox_json_path: ""
  description_json_path: ""

optim:
  alpha: 1.0
  epsilon: 8
  steps: 100
  enable_visual_contrastive: false
  visual_contrastive_weight: 0.5
  contrastive_temperature: 0.07
  enable_relative_proxy: false
  relative_proxy_weight: 0.25
  enable_gaussian: false
  gaussian_prob: 0.5
  gaussian_scale_multiplier: 0.25
  enable_crop_pad_resize: false
  crop_pad_resize_prob: 0.5
  enable_diffjpeg: false
  diffjpeg_prob: 0.5
  jpeg_quality_min: 0.55
  jpeg_quality_max: 0.95
  enable_patchdrop: false
  patchdrop_prob: 0.3
  patchdrop_rate: 0.15
  perturbation_averages: 1

model:
  input_res: 640
  use_source_crop: true
  use_target_crop: true
  crop_scale: [0.5, 0.9]
  ensemble: true
  device: "cuda:0"
  backbone: ["B16", "B32", "Laion"]

wandb:
  project: "geoshield"
  entity: ""

attack: 'fgsm'
